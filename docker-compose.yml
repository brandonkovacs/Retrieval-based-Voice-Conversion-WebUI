version: "3.8"
services:
  rvc:
    image: rvc/rvc-webui:latest
    container_name: rvc-webui
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./weights:/app/assets/weights
      - ./opt:/app/opt
      - ./dataset:/app/dataset # you can use this folder in order to provide your dataset for model training
    ports:
      - 7865:7865
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]